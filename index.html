<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nocturne Lens</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="intro">
    <h1 class="intro-logo">NOCTURNE LENS</h1>
    <p>Light. Color. Moment</p>
</div>

<div class="fog"></div>

<header>
    <h1 class="logo">Nocturne Lens</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#gallery">Gallery</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>The Art Of Observing Nature</h2>
    <p class="subtitle">Wildlife & Nature Photography by Bryan Paul</p>
</section>

<section class="filters">
    <button onclick="filterPhotos('all')">All</button>
    <button onclick="filterPhotos('birds')">Birds</button>
    <button onclick="filterPhotos('animals')">Animals</button>
    <button onclick="filterPhotos('landscape')">Landscapes</button>
</section>

<section id="gallery" class="gallery">
    <div class="photo birds">
        <img src="images/photo1.jpg" alt="Bird photography" onclick="openViewer(this)">
        <div class="photoButtons">
            <a href="#">Buy</a>
            <a href="#contact">Contact</a>
        </div>
    </div>
    <div class="photo animals">
        <img src="images/photo2.jpg" alt="Animal photography" onclick="openViewer(this)">
        <div class="photoButtons">
            <a href="#">Buy</a>
            <a href="#contact">Contact</a>
        </div>
    </div>
    <div class="photo landscape">
        <img src="images/photo3.jpg" alt="Landscape photography" onclick="openViewer(this)">
        <div class="photoButtons">
            <a href="#">Buy</a>
            <a href="#contact">Contact</a>
        </div>
    </div>
    <div class="photo birds">
        <img src="images/photo4.jpg" alt="Bird photography" onclick="openViewer(this)">
        <div class="photoButtons">
            <a href="#">Buy</a>
            <a href="#contact">Contact</a>
        </div>
    </div>
    <div class="photo animals">
        <img src="images/photo5.jpg" alt="Animal photography" onclick="openViewer(this)">
        <div class="photoButtons">
            <a href="#">Buy</a>
            <a href="#contact">Contact</a>
        </div>
    </div>
</section>

<div id="viewer">
    <span id="closeViewer" onclick="closeViewer()">×</span>
    <img id="viewerImage" src="" alt="Full view">
</div>

<section id="contact">
    <h2>Contact</h2>
    <p>Email: bryanblpaul@gmail.com</p>
</section>

<script src="script.js"></script>
</body>
</html>
